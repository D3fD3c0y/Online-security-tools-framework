name: Sync Source And Deploy Pages

on:
  repository_dispatch:
    types:
      - source-updated
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout framework repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync tree.json from source repository
        run: |
          python scripts/sync_tree.py

      - name: Commit updated tree.json if changed
        shell: bash
        run: |
          if git diff --quiet -- data/tree.json; then
            echo "No data/tree.json changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/tree.json
            git commit -m "chore: sync tree.json from Free-online-security-services"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate build metadata
        shell: bash
        run: |
          mkdir -p data

          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_VERSION="v${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          PUSHED_AT="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          cat > data/build-meta.json <<EOF
          {
            "version": "${BUILD_VERSION}",
            "pushedAt": "${PUSHED_AT}",
            "commit": "${GITHUB_SHA}",
            "shortSha": "${SHORT_SHA}",
            "runNumber": "${GITHUB_RUN_NUMBER}"
          }
          EOF

          echo "Generated data/build-meta.json"
          cat data/build-meta.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
